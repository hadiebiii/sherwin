                    "ب) ضایعه به تدریج رسوبات رادیواپاک مرکزی پیدا کرده و در نهایت به توده‌های رادیواپاک با هاله لوسنت تبدیل می‌شود.",
                    "ج) ضایعه خودبه‌خود تحلیل رفته و در پی افزایش سن بیمار با استخوان نرمال جایگزین می‌شود.",
                    "د) ضایعه به علت انجام درمان ریشه اشتباه، فوراً به فاز تهاجمی استئومای محیطی تبدیل خواهد شد."
                ],
                correctOptionIndex: 1,
                analysis: "<b>چرا گزینه «ب» صحیح است:</b> ضایعات سیمنتو-اوسئوس دیسپلازی دارای سیر کلاسیک سه مرحله‌ای هستند: ۱. لایتیک (رادیولوسنت)، ۲. مخلوط (ظهور کانون‌های رادیواپک مرکزی) و ۳. اسکلروتیک (توده‌های کاملاً رادیواپک با هاله لوسنت). شناخت این سیر مانع از درمان ریشه غیرضروری می‌شود.<br><br><b>قانون مرور یک‌خطی:</b> سیر پیشرفت PCOD از رادیولوسنسی خالص شروع شده، به فاز مخلوط رسیده و به نمای رادیواپاک ختم می‌شود."
            }
        ];

        let currentScore = 0;
        let answeredQuestions = new Set();

        function renderQuestions() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = ''; // Clear container

            questions.forEach((q, index) => {
                const qNumber = index + 1;
                
                // Build the options HTML
                let optionsHtml = '';
                q.options.forEach((opt, optIndex) => {
                    optionsHtml += `
                        <label class="flex items-start gap-3 p-4 rounded-xl border-2 border-transparent bg-white hover:bg-indigo-50 hover:border-indigo-100 cursor-pointer transition-all duration-200 group" id="label-q${q.id}-opt${optIndex}">
                            <div class="pt-1">
                                <input type="radio" name="question-${q.id}" value="${optIndex}" class="peer hidden" onchange="selectOption(${q.id}, ${optIndex})">
                                <div class="w-5 h-5 rounded-full border-2 border-gray-300 flex items-center justify-center peer-checked:border-indigo-600 peer-checked:bg-indigo-600 transition-colors">
                                    <div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
                                </div>
                            </div>
                            <span class="text-gray-700 leading-relaxed group-hover:text-indigo-900">${opt}</span>
                        </label>
                    `;
                });

                // Build the entire question card
                const card = `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8 mb-8 relative overflow-hidden transition-all duration-300" id="card-${q.id}">
                        <!-- Top decorative bar -->
                        <div class="absolute top-0 left-0 w-full h-1 bg-indigo-500"></div>
                        
                        <!-- Header & Badges -->
                        <div class="mb-6">
                            <h2 class="text-xl md:text-2xl font-extrabold text-gray-800">
                                <span class="text-indigo-600">سوال ${qNumber}</span>
                            </h2>
                        </div>

                        <!-- Scenario -->
                        <div class="bg-slate-50 border-r-4 border-indigo-400 p-5 rounded-l-xl mb-6 shadow-inner">
                            <p class="text-gray-700 leading-8 text-justify font-medium">${q.scenario}</p>
                        </div>

                        <!-- Options -->
                        <div class="space-y-3 mb-6" id="options-container-${q.id}">
                            ${optionsHtml}
                        </div>

                        <!-- Action Button -->
                        <button id="btn-${q.id}" onclick="submitAnswer(${q.id})" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-xl transition-colors shadow-md flex items-center justify-center gap-2">
                            <span>بررسی و مشاهده پاسخ تشریحی</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                            </svg>
                        </button>

                        <!-- Results & Analysis Area (Hidden initially) -->
                        <div id="result-${q.id}" class="mt-8 hidden opacity-0 transition-opacity duration-500 ease-in-out">
                            <div class="w-full h-px bg-gray-200 mb-6"></div>
                            
                            <div class="flex items-center gap-3 mb-4" id="verdict-banner-${q.id}">
                                <!-- Filled by JS -->
                            </div>
                            
                            <div class="bg-gray-50 rounded-xl p-6 border border-gray-100">
                                <h4 class="font-bold text-gray-800 mb-3 text-lg">تحلیل علمی رفرنس:</h4>
                                <p class="text-gray-600 leading-8 text-justify">${q.analysis}</p>
                            </div>
                        </div>
                    </div>
                `;
                
                container.innerHTML += card;
            });
        }

        // UI helper to simulate radio button selection styling
        function selectOption(qId, optIndex) {
            if(answeredQuestions.has(qId)) return; // Prevent changing visual state if already answered

            // Reset all labels for this question
            const q = questions.find(question => question.id === qId);
            for(let i=0; i < q.options.length; i++) {
                const label = document.getElementById(`label-q${qId}-opt${i}`);
                if(label) {
                    label.classList.remove('bg-indigo-50', 'border-indigo-300');
                    label.classList.add('bg-white', 'border-transparent');
                }
            }
            
            // Highlight selected
            const selectedLabel = document.getElementById(`label-q${qId}-opt${optIndex}`);
            if(selectedLabel) {
                selectedLabel.classList.remove('bg-white', 'border-transparent');
                selectedLabel.classList.add('bg-indigo-50', 'border-indigo-300');
            }
        }

        // Custom Toast function
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = message;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        function submitAnswer(qId) {
            if (answeredQuestions.has(qId)) return; // Already answered

            const questionObj = questions.find(q => q.id === qId);
            const selectedRadio = document.querySelector(`input[name="question-${qId}"]:checked`);
            
            if (!selectedRadio) {
                showToast("لطفاً ابتدا یک گزینه را انتخاب کنید.");
                return;
            }

            const selectedIndex = parseInt(selectedRadio.value);
            const isCorrect = selectedIndex === questionObj.correctOptionIndex;
            
            // Mark as answered
            answeredQuestions.add(qId);

            // Update Score
            if (isCorrect) {
                currentScore++;
                document.getElementById('score-display').innerText = `${currentScore} / ۲۰`;
            }

            // Disable all radios for this question
            const allRadios = document.querySelectorAll(`input[name="question-${qId}"]`);
            allRadios.forEach(radio => {
                radio.disabled = true;
                const label = document.getElementById(`label-q${qId}-opt${radio.value}`);
                label.classList.remove('cursor-pointer', 'hover:bg-indigo-50');
                label.classList.add('cursor-default', 'opacity-70');
            });

            // Styling the selected and correct options
            const correctLabel = document.getElementById(`label-q${qId}-opt${questionObj.correctOptionIndex}`);
            const userLabel = document.getElementById(`label-q${qId}-opt${selectedIndex}`);

            // Always highlight correct answer green
            correctLabel.classList.remove('bg-white', 'bg-indigo-50', 'border-transparent', 'border-indigo-300', 'opacity-70');
            correctLabel.classList.add('bg-green-50', 'border-green-500', 'opacity-100', 'correct-anim');

            if (!isCorrect) {
                // Highlight selected wrong answer red
                userLabel.classList.remove('bg-indigo-50', 'border-indigo-300', 'opacity-70');
                userLabel.classList.add('bg-red-50', 'border-red-400', 'opacity-100', 'wrong-anim');
            }

            // Hide the button
            const btn = document.getElementById(`btn-${qId}`);
            btn.style.display = 'none';

            // Show results
            const resultDiv = document.getElementById(`result-${qId}`);
            const banner = document.getElementById(`verdict-banner-${qId}`);
            
            if (isCorrect) {
                banner.innerHTML = `
                    <div class="bg-green-100 p-2 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold text-green-700">پاسخ شما کاملاً صحیح است!</h3>
                `;
            } else {
                banner.innerHTML = `
                    <div class="bg-red-100 p-2 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold text-red-700">پاسخ نادرست بود.</h3>
                `;
            }

            resultDiv.classList.remove('hidden');
            // Small timeout to allow display:block to apply before changing opacity for transition
            setTimeout(() => {
                resultDiv.classList.remove('opacity-0');
            }, 50);
        }

        // Initialize the app on load
        window.onload = () => {
            renderQuestions();
        };
    </script>
</body>
</html>
