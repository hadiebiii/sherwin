                    "دوز معادل اشعه ایکس بیشتر است، زیرا قدرت نفوذ اشعه ایکس به مراتب بالاتر از ذرات آلفا است.",
                    "مفهوم سیورت در مورد ذرات سنگین مانند آلفا کاربرد ندارد و فقط برای فوتون‌ها محاسبه می‌شود."
                ],
                correctOptionIndex: 1,
                analysis: "<b>چرا گزینه صحیح است:</b> دوز معادل (H) بر حسب سیورت برابر است با دوز جذبی (Gy) ضربدر ضریب وزنی پرتو (Radiation Weighting Factor یا wR). ضریب wR میزان آسیب بیولوژیک یک پرتو را نشان می‌دهد. برای فوتون‌ها (اشعه ایکس و گاما) این ضریب ۱ است (لذا 1Gy = 1Sv). اما برای ذرات آلفا به علت LET بسیار بالا، ضریب wR برابر با ۲۰ است. بنابراین ۱ گری اشعه آلفا معادل ۲۰ سیورت تخریب بیولوژیک ایجاد می‌کند."
            },
            {
                id: 20,
                scenario: "در فیزیک پرتونگاری دیجیتال، مفهوم فرکانس فضایی (Spatial Frequency) بر حسب جفت‌خط بر میلی‌متر (lp/mm) بیان می‌شود. با افزایش سیستماتیک ماتریس تصویر (Matrix size) و کاهش اندازه پیکسل‌ها در یک فیلد دید ثابت، فرکانس فضایی و متعاقباً کدام شاخص کیفی تصویر مستقیماً بهبود می‌یابد؟",
                options: [
                    "رزولوشن کنتراست (Contrast Resolution) به شدت افزایش می‌یابد.",
                    "نسبت سیگنال به نویز (SNR) در فرکانس‌های پایین به شدت تقویت می‌شود.",
                    "رزولوشن فضایی (Spatial Resolution) تصویر به صورت خطی بهبود می‌یابد.",
                    "داینامیک رنج (Dynamic Range) سنسور گسترش می‌یابد."
                ],
                correctOptionIndex: 2,
                analysis: "<b>چرا گزینه صحیح است:</b> فرکانس فضایی به توانایی تفکیک اجسام ریز در تصویر اشاره دارد. با کوچکتر شدن اندازه پیکسل‌ها (و بزرگتر شدن ماتریس در یک منطقه مشخص)، سیستم قادر است جفت‌خط‌های بیشتری را در یک میلی‌متر (فرکانس فضایی بالاتر) بازتولید کند. فرکانس فضایی بالاتر معادل مستقیم با افزایش رزولوشن فضایی (Spatial Resolution) و توانایی نمایش جزئیات ریزتر در تصویر است. کنتراست به عمق بیت (Bit depth) بستگی دارد، نه سایز پیکسل."
            }
        ];

        let currentScore = 0;
        let answeredQuestions = new Set();

        function renderQuestions() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = ''; 

            questions.forEach((q, index) => {
                const qNumber = index + 1;
                
                let optionsHtml = '';
                q.options.forEach((opt, optIndex) => {
                    optionsHtml += `
                        <label class="flex items-start gap-3 p-4 rounded-xl border-2 border-transparent bg-white hover:bg-blue-50 hover:border-blue-200 cursor-pointer transition-all duration-200 group" id="label-q${q.id}-opt${optIndex}">
                            <div class="pt-1">
                                <input type="radio" name="question-${q.id}" value="${optIndex}" class="peer hidden" onchange="selectOption(${q.id}, ${optIndex})">
                                <div class="w-5 h-5 rounded-full border-2 border-gray-300 flex items-center justify-center peer-checked:border-blue-600 peer-checked:bg-blue-600 transition-colors">
                                    <div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
                                </div>
                            </div>
                            <span class="text-gray-700 leading-relaxed group-hover:text-blue-900 font-medium">${opt}</span>
                        </label>
                    `;
                });

                const card = `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8 mb-8 relative overflow-hidden transition-all duration-300" id="card-${q.id}">
                        <div class="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>
                        
                        <div class="mb-6 flex items-center justify-between">
                            <h2 class="text-xl font-extrabold text-gray-800">
                                <span class="text-blue-600">سوال ${qNumber}</span>
                            </h2>
                        </div>

                        <div class="bg-slate-50 border-r-4 border-blue-400 p-5 rounded-l-xl mb-6 shadow-inner">
                            <p class="text-gray-700 leading-8 text-justify">${q.scenario}</p>
                        </div>

                        <div class="space-y-3 mb-6" id="options-container-${q.id}">
                            ${optionsHtml}
                        </div>

                        <button id="btn-${q.id}" onclick="submitAnswer(${q.id})" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition-colors shadow-md flex items-center justify-center gap-2">
                            <span>ثبت پاسخ و مشاهده تحلیل</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                            </svg>
                        </button>

                        <div id="result-${q.id}" class="mt-8 hidden opacity-0 transition-opacity duration-500 ease-in-out">
                            <div class="w-full h-px bg-gray-200 mb-6"></div>
                            
                            <div class="flex items-center gap-3 mb-4" id="verdict-banner-${q.id}"></div>
                            
                            <div class="bg-gray-50 rounded-xl p-6 border border-gray-100">
                                <h4 class="font-bold text-gray-800 mb-3 text-lg flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" viewBox="0 0 20 20" fill="currentColor">
                                      <path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z" />
                                    </svg>
                                    تحلیل علمی رفرنس (Bushong):
                                </h4>
                                <p class="text-gray-600 leading-8 text-justify">${q.analysis}</p>
                            </div>
                        </div>
                    </div>
                `;
                
                container.innerHTML += card;
            });
        }

        function selectOption(qId, optIndex) {
            if(answeredQuestions.has(qId)) return;

            const q = questions.find(question => question.id === qId);
            for(let i=0; i < q.options.length; i++) {
                const label = document.getElementById(`label-q${qId}-opt${i}`);
                if(label) {
                    label.classList.remove('bg-blue-50', 'border-blue-200');
                    label.classList.add('bg-white', 'border-transparent');
                }
            }
            
            const selectedLabel = document.getElementById(`label-q${qId}-opt${optIndex}`);
            if(selectedLabel) {
                selectedLabel.classList.remove('bg-white', 'border-transparent');
                selectedLabel.classList.add('bg-blue-50', 'border-blue-200');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = message;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        function submitAnswer(qId) {
            if (answeredQuestions.has(qId)) return;

            const questionObj = questions.find(q => q.id === qId);
            const selectedRadio = document.querySelector(`input[name="question-${qId}"]:checked`);
            
            if (!selectedRadio) {
                showToast("لطفاً ابتدا یک گزینه را انتخاب کنید.");
                return;
            }

            const selectedIndex = parseInt(selectedRadio.value);
            const isCorrect = selectedIndex === questionObj.correctOptionIndex;
            
            answeredQuestions.add(qId);

            if (isCorrect) {
                currentScore++;
                document.getElementById('score-display').innerText = `${currentScore} / ۲۰`;
            }

            const allRadios = document.querySelectorAll(`input[name="question-${qId}"]`);
            allRadios.forEach(radio => {
                radio.disabled = true;
                const label = document.getElementById(`label-q${qId}-opt${radio.value}`);
                label.classList.remove('cursor-pointer', 'hover:bg-blue-50');
                label.classList.add('cursor-default', 'opacity-70');
            });

            const correctLabel = document.getElementById(`label-q${qId}-opt${questionObj.correctOptionIndex}`);
            const userLabel = document.getElementById(`label-q${qId}-opt${selectedIndex}`);

            correctLabel.classList.remove('bg-white', 'bg-blue-50', 'border-transparent', 'border-blue-200', 'opacity-70');
            correctLabel.classList.add('bg-green-50', 'border-green-500', 'opacity-100', 'correct-anim');

            if (!isCorrect) {
                userLabel.classList.remove('bg-blue-50', 'border-blue-200', 'opacity-70');
                userLabel.classList.add('bg-red-50', 'border-red-400', 'opacity-100', 'wrong-anim');
            }

            const btn = document.getElementById(`btn-${qId}`);
            btn.style.display = 'none';

            const resultDiv = document.getElementById(`result-${qId}`);
            const banner = document.getElementById(`verdict-banner-${qId}`);
            
            if (isCorrect) {
                banner.innerHTML = `
                    <div class="bg-green-100 p-2 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold text-green-700">پاسخ شما کاملاً صحیح است</h3>
                `;
            } else {
                banner.innerHTML = `
                    <div class="bg-red-100 p-2 rounded-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold text-red-700">پاسخ نادرست بود</h3>
                `;
            }

            resultDiv.classList.remove('hidden');
            setTimeout(() => {
                resultDiv.classList.remove('opacity-0');
            }, 50);
        }

        window.onload = () => {
            renderQuestions();
        };
    </script>
</body>
</html>
